#!/usr/bin/env -S llm -t
model: claude-sonnet-4-6
system: |
  Use tools to run calculations. Show your work step by step.
functions: |
  def add(a: int, b: int) -> int:
      "Add two numbers"
      return a + b
  def multiply(a: int, b: int) -> int:
      "Multiply two numbers"
      return a * b
  def subtract(a: int, b: int) -> int:
      "Subtract b from a"
      return a - b
