<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis Array Playground</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --muted: #888;
    --green: #4ecca3;
    --border: #2a2a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--panel);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0;
  }
  #sidebar h2 { font-size: 13px; color: var(--accent); padding: 8px 16px; text-transform: uppercase; letter-spacing: 1px; }
  .cmd-btn {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text); padding: 8px 16px; font-family: inherit; font-size: 13px;
    cursor: pointer; transition: background 0.15s;
  }
  .cmd-btn:hover { background: var(--accent2); }
  .cmd-btn.active { background: var(--accent); color: #fff; font-weight: bold; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 16px; overflow-y: auto; }
  h1 { font-size: 22px; color: var(--accent); }
  h1 span { color: var(--green); }

  /* Builder */
  #builder { background: var(--panel); border-radius: 8px; padding: 20px; }
  #builder h3 { color: var(--green); margin-bottom: 12px; font-size: 16px; }
  .field { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .field label { min-width: 100px; font-size: 13px; color: var(--muted); }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 13px;
  }
  .field input { flex: 1; min-width: 120px; }
  .field select { min-width: 140px; }
  .field input[type="checkbox"] { flex: none; width: 16px; height: 16px; }
  .flags { display: flex; gap: 14px; flex-wrap: wrap; }
  .flags label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); cursor: pointer; min-width: auto; }
  #cmd-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }

  /* Preview */
  #preview-wrap { background: var(--panel); border-radius: 8px; padding: 14px 20px; }
  #preview-wrap h4 { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  #command-preview {
    font-size: 15px; color: var(--green); word-break: break-all;
    background: var(--bg); padding: 10px 14px; border-radius: 4px; min-height: 20px;
  }

  /* Controls */
  .controls { display: flex; gap: 10px; }
  .btn {
    padding: 10px 24px; border: none; border-radius: 6px; font-family: inherit;
    font-size: 14px; font-weight: bold; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  #run-btn { background: var(--accent); color: #fff; }
  #clear-btn { background: var(--accent2); color: var(--text); }
  #seed-btn { background: var(--green); color: var(--bg); }

  /* Output */
  #output-wrap { background: var(--panel); border-radius: 8px; padding: 16px 20px; flex: 1; min-height: 160px; }
  #output-wrap h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  #reply {
    font-size: 13px; white-space: pre-wrap; word-break: break-word;
    max-height: 400px; overflow-y: auto; line-height: 1.6;
  }
  .reply-ok { color: var(--green); }
  .reply-err { color: var(--accent); }
  .reply-info { color: var(--muted); }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Array Commands</h2>
</div>

<div id="main">
  <h1>Redis <span>Array</span> Playground</h1>

  <div id="builder">
    <h3 id="cmd-title">Select a command</h3>
    <div id="cmd-desc"></div>
    <div id="fields"></div>
  </div>

  <div id="preview-wrap">
    <h4>Command Preview</h4>
    <div id="command-preview">...</div>
  </div>

  <div class="controls">
    <button class="btn" id="run-btn">Run Command</button>
    <button class="btn" id="seed-btn">Load Sample Data</button>
    <button class="btn" id="clear-btn">Clear Output</button>
  </div>

  <div id="output-wrap">
    <h4>Output</h4>
    <div id="reply"><span class="reply-info">Select a command and click Run.</span></div>
  </div>
</div>

<script src="playground.js"></script>
</body>
</html>
