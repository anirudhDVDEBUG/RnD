<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iNaturalist Sightings Viewer</title>
<style>
  :root { --bg: #f5f5f0; --card: #fff; --text: #333; --muted: #777; --accent: #4a7c59; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  header { background: var(--accent); color: #fff; padding: 1.5rem 1rem; text-align: center; }
  header h1 { font-size: 1.5rem; font-weight: 600; }
  header p { font-size: .85rem; opacity: .85; margin-top: .25rem; }
  #status { text-align: center; padding: 2rem; color: var(--muted); }
  .clump { margin: 1.5rem auto; max-width: 900px; background: var(--card); border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
  .clump-header { padding: .75rem 1rem; background: #e8efe8; font-size: .8rem; color: var(--muted); display: flex; justify-content: space-between; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 2px; padding: 2px; }
  .card { position: relative; cursor: pointer; overflow: hidden; aspect-ratio: 1; background: #eee; }
  .card img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; }
  .card:hover img { transform: scale(1.05); }
  .card .label { position: absolute; bottom: 0; left: 0; right: 0; padding: .35rem .5rem; background: linear-gradient(transparent, rgba(0,0,0,.7)); color: #fff; font-size: .7rem; line-height: 1.3; }
  .card .label .sci { font-style: italic; opacity: .8; }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 75vh; border-radius: 4px; }
  .lightbox .info { color: #fff; text-align: center; margin-top: 1rem; max-width: 600px; }
  .lightbox .info h3 { font-size: 1.1rem; }
  .lightbox .info p { font-size: .85rem; opacity: .8; margin-top: .25rem; }
  .lightbox .close { position: absolute; top: 1rem; right: 1.5rem; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; line-height: 1; }
  .lightbox .close:hover { opacity: .7; }

  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <h1>iNaturalist Sightings</h1>
  <p>Git-scraped observations grouped by time &amp; location</p>
</header>

<div id="status">Loading observations&hellip;</div>
<div id="app"></div>

<!-- Lightbox modal -->
<div class="lightbox" id="lightbox">
  <button class="close" aria-label="Close">&times;</button>
  <img src="" alt="">
  <div class="info"><h3></h3><p></p></div>
</div>

<script>
(function() {
  // DATA_URL can be overridden by setting window.CLUMPS_URL before this script runs.
  // For local demo, fall back to a relative file.
  const DATA_URL = window.CLUMPS_URL || 'clumps.json';

  const app = document.getElementById('app');
  const status = document.getElementById('status');
  const lightbox = document.getElementById('lightbox');
  const lbImg = lightbox.querySelector('img');
  const lbTitle = lightbox.querySelector('.info h3');
  const lbDesc = lightbox.querySelector('.info p');

  // Close lightbox
  lightbox.querySelector('.close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function closeLightbox() { lightbox.classList.remove('active'); }

  function openLightbox(obs, photoIdx) {
    const photo = obs.photos[photoIdx || 0];
    lbImg.src = photo.large;
    lbImg.alt = obs.common_name || obs.species_guess || 'Observation';
    lbTitle.textContent = obs.common_name || obs.species_guess || 'Unknown';
    const parts = [];
    if (obs.scientific_name) parts.push(obs.scientific_name);
    if (obs.observed_on) parts.push(obs.observed_on);
    if (obs.place_guess) parts.push(obs.place_guess);
    lbDesc.textContent = parts.join(' \u2022 ');
    lightbox.classList.add('active');
  }

  async function load() {
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const clumps = await resp.json();
      render(clumps);
    } catch (err) {
      status.textContent = `Failed to load data: ${err.message}`;
    }
  }

  function render(clumps) {
    if (!clumps.length) { status.textContent = 'No observations found.'; return; }
    status.style.display = 'none';
    const totalObs = clumps.reduce((s, c) => s + c.observations.length, 0);
    document.querySelector('header p').textContent =
      `${totalObs} observations in ${clumps.length} sighting groups`;

    clumps.forEach((clump, ci) => {
      const section = document.createElement('div');
      section.className = 'clump';

      const first = clump.observations[0];
      const hdr = document.createElement('div');
      hdr.className = 'clump-header';
      hdr.innerHTML = `<span>${first.place_guess || 'Unknown location'}</span>
                        <span>${first.observed_on || ''} &mdash; ${clump.observations.length} obs</span>`;
      section.appendChild(hdr);

      const grid = document.createElement('div');
      grid.className = 'grid';

      clump.observations.forEach(obs => {
        if (!obs.photos || !obs.photos.length) return;
        obs.photos.forEach((photo, pi) => {
          const card = document.createElement('div');
          card.className = 'card';
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = photo.small;
          img.alt = obs.common_name || obs.species_guess || '';
          card.appendChild(img);

          if (pi === 0) {
            const label = document.createElement('div');
            label.className = 'label';
            label.innerHTML = `${obs.common_name || obs.species_guess || 'Unknown'}
              ${obs.scientific_name ? `<br><span class="sci">${obs.scientific_name}</span>` : ''}`;
            card.appendChild(label);
          }

          card.addEventListener('click', () => openLightbox(obs, pi));
          grid.appendChild(card);
        });
      });

      section.appendChild(grid);
      app.appendChild(section);
    });
  }

  load();
})();
</script>
</body>
</html>
