# Quality gates
selection:
  per_topic_top_k: 5         # max items per topic per day
  min_score: 0.30            # below this, drop (no padding)
  prototype_min_score: 0.50  # below this, topic note only (no full mini-repo)

active_projects:
  pitchbot: B2B outreach pipeline with Naukri RESDEX integration and CRO-audit upsell
  aria: AI voice interviewer for VLSI hiring
  smart_glasses: custom RISC-V SoC for AI smart glasses
  trendforge: this autonomous news + research agent
  d2c_creative: Claude-driven D2C ad-creative service (Shopify + Meta + UGC video)
  agent_factory: managed n8n + Claude-skills offering for Indian SMEs
  byob_campaign_mgr: autonomous Meta-Ads / Shopify campaign manager via BYOB browser-use

boring:
  # Pure research / academic noise — skip unless title explicitly mentions a tool
  - arxiv
  - cs.AI
  - cs.LG
  - weak-to-strong
  - spectral
  - benchmark survey
  # Generic finance noise
  - funding round
  - exec hire
  - ipo
  - generic gpt comparison
  - politics
